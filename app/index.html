<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#1A1918"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="SYNRG"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.png"/>
  <link rel="icon" type="image/png" href="icon-192.png"/>
  <title>SYNRG App</title>
  <style>
    @font-face {
      font-family: 'MontBlanc';
      src: url('/synrg-website/app/fonts/MontBlanc-Bold.woff2') format('woff2'),
           url('/synrg-website/app/fonts/MontBlanc-Bold.woff')  format('woff');
      font-weight: 700 900;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MontBlanc';
      src: url('/synrg-website/app/fonts/MontBlanc-SemiBold.woff2') format('woff2'),
           url('/synrg-website/app/fonts/MontBlanc-SemiBold.woff')  format('woff');
      font-weight: 400 600;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'MontBlanc';
      src: url('/synrg-website/app/fonts/MontBlanc-BoldItalic.woff2') format('woff2'),
           url('/synrg-website/app/fonts/MontBlanc-BoldItalic.woff')  format('woff');
      font-weight: 700 900;
      font-style: italic;
      font-display: swap;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;width:100%;background:#1A1918;color:#F4F4F3;font-family:'MontBlanc',sans-serif}
    #root{height:100%}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:#3D3A38;border-radius:99px}
  </style>
  <script type="module" crossorigin src="/synrg-website/app/assets/index-Gx2VJ-Da.js"></script>
</head>
<body>
  <div id="root"></div>
  <script>
    if('serviceWorker' in navigator){
      window.addEventListener('load',()=>{
        // Unregister any old SW at wrong scope
        navigator.serviceWorker.getRegistrations().then(regs=>{
          regs.forEach(r=>{if(!r.scope.includes('/synrg-website/app/'))r.unregister()});
        });
        navigator.serviceWorker.register('/synrg-website/app/sw.js').catch(()=>{});
      });
    }
  </script>
</body>
</html>
